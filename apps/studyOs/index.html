    <!-- JSON-LD: Website + Organization (global) -->

          "description": "Premium study productivity workspace with Pomodoro timers, typing master, task management and analytics.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": { "@type": "EntryPoint", "urlTemplate": "https://study.sailibrary.online/?q={search_term_string}" },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "name": "Sai Library",
          "url": "https://www.sailibrary.online",
          "logo": "https://study.sailibrary.online/icons/icon-512x512.png",

        {
          "@type": "SoftwareApplication",
          "name": "Sai Library Study OS",
          "applicationCategory": "EducationApplication",
          "operatingSystem": "Web",
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "INR" },
          "url": "https://study.sailibrary.online"
        }
      ]
    }
    </script>
